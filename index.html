<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: linear-gradient(270deg, #0f0c29, #302b63, #24243e);
  background-size: 600% 600%;
  animation: bgMove 12s ease infinite;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* النجوم */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;
  animation: moveStars 60s linear infinite;
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}

@keyframes moveStars {
  from {background-position: 0 0;}
  to {background-position: 1000px 1000px;}
}

.container {
  margin-top: 80px;
  position: relative;
  z-index: 1;
}

h1 {
  font-size: 50px;
  color: #bb86fc;
  text-shadow: 0 0 25px #bb86fc;
}

/* أزرار */
.btn {
  display: inline-block;
  margin: 10px;
  padding: 12px 25px;
  border-radius: 12px;
  text-decoration: none;
  font-size: 16px;
  transition: 0.3s;
  color: white;
}

.whatsapp { background: #25D366; }
.telegram { background: #0088cc; }
.tiktok { background: #ff0050; }
.discord { background: #5865F2; }

.btn:hover {
  transform: scale(1.1);
}

/* الحسابات */
.accounts {
  margin-top: 50px;
}

.card {
  background: rgba(255,255,255,0.05);
  margin: 20px auto;
  padding: 20px;
  width: 300px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(128,0,255,0.3);
  transition: 0.3s;
}

.card:hover{
  transform: scale(1.05);
}

.card a {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: #25D366;
  color: white;
  border-radius: 10px;
  text-decoration: none;
}

/* فوتر */
.footer{
margin-top:40px;
padding:20px;
opacity:0.7;
}
</style>
</head>
