<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realm Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: linear-gradient(270deg, #0f0c29, #302b63, #24243e);
  background-size: 600% 600%;
  animation: bgMove 12s ease infinite;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* نجوم */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;
  animation: moveStars 60s linear infinite;
  opacity: 0.15;
}

@keyframes moveStars {
  from {background-position: 0 0;}
  to {background-position: 1000px 1000px;}
}

/* محتوى */
.container {
  margin-top: 80px;
}

h1 {
  font-size: 50px;
  color: #bb86fc;
  text-shadow: 0 0 25px #bb86fc;
}

/* أزرار */
.btn {
  display: inline-block;
  margin: 10px;
  padding: 12px 25px;
  border-radius: 12px;
  text-decoration: none;
  font-size: 16px;
  transition: 0.3s;
}

.whatsapp {
  background: #25D366;
}

.telegram {
  background: #0088cc;
}

.tiktok {
  background: #ff0050;
}

.btn:hover {
  transform: scale(1.1);
}

/* الحسابات */
.accounts {
  margin-top: 50px;
}

.card {
  background: rgba(255,255,255,0.05);
  margin: 20px auto;
  padding: 20px;
  width: 300px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(128,0,255,0.3);
}

.card a {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: #0088cc;
  color: white;
  border-radius: 10px;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="container">
  <h1>🔥 Realm Store 🔥</h1>
  <p>بيع حسابات Blox Fruits و Bounty Rush</p>

  <!-- الأزرار -->
  <a href="https://wa.me/966562585336" target="_blank" class="btn whatsapp">💬 واتساب</a>
  <a href="https://t.me/+CEsvry-8hAgxNWRk" target="_blank" class="btn telegram">🚀 تلغرام</a>
  <a href="https://tiktok.com/@realm_33" target="_blank" class="btn tiktok">🎵 تيك توك</a>

  <!-- الحسابات -->
  <div class="accounts">
    <h2>🔥 الحسابات المتوفرة</h2>

    <div class="card">
      <h3>حساب Blox Fruits</h3>
      <p>لفل عالي + فواكه نادرة</p>
      <a href="https://t.me/+CEsvry-8hAgxNWRk" target="_blank">📲 اطلب من التلغرام</a>
    </div>

    <div class="card">
      <h3>حساب Bounty Rush</h3>
      <p>شخصيات قوية + حساب جاهز</p>
      <a href="https://t.me/+CEsvry-8hAgxNWRk" target="_blank">📲 اطلب من التلغرام</a>
    </div>

  </div>

</div>

</body>
</html>
